<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spin the Wheel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="wheel-section">
            <div class="wheel-container">
                <img src="img/wheel.png" alt="Wheel" class="wheel" id="wheel">
                <img src="img/pointer.png" alt="Pointer" class="pointer">
            </div>
    
            <input type="number" id="diceInput" placeholder="Enter dice side (1-6)" min="1" max="6">
            <input type="number" id="betInput" placeholder="Enter your bet" min="1" value="100">
    
            <button id="spinButton">SPIN!</button>
    
            <div class="result">
                <p id="multiplier">Multiplier: 0</p>
                <p id="winnings">Winnings: 0</p>
            </div>
        </div>
    
        <div class="legend">
            <h3>Wheel Legend (Multiplier)</h3>
            <ul id="legendList"></ul>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
